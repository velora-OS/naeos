{{ if and (hasPrefix .RelPermalink "/docs/") (or .NextInSection .PrevInSection) }}
<nav class="doc-pagination" aria-label="Documentation pagination">
    {{ with .NextInSection }}
    <a href="{{ .RelPermalink }}" class="doc-pagination-link prev">
        <span class="doc-pagination-label">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="vertical-align:middle;margin-right:4px;"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            Previous
        </span>
        <span class="doc-pagination-title">{{ .Title }}</span>
    </a>
    {{ end }}
    {{ with .PrevInSection }}
    <a href="{{ .RelPermalink }}" class="doc-pagination-link next">
        <span class="doc-pagination-label">
            Next
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="vertical-align:middle;margin-left:4px;"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
        </span>
        <span class="doc-pagination-title">{{ .Title }}</span>
    </a>
    {{ end }}
</nav>
{{ end }}
