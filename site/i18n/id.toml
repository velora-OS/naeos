[hero_subtitle]
other = "NAEOS adalah platform rekayasa deklaratif yang mengubah spesifikasi YAML/JSON menjadi sistem perangkat lunak multi-bahasa yang tervalidasi — dengan ketelusuran penuh dari niat hingga implementasi."

