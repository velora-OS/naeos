[feature_pipeline]
other = "Pipeline Engine"

[feature_pipeline_desc]
other = "Pipeline DAG 9-tahap dari parsing hingga ekspor. Parse, normalisasi, resolusi, bangun, validasi, jadwalkan, hasilkan, kompilasi, dan ekspor — dengan observabilitas penuh di setiap tahap."

[feature_compiler]
other = "Kompiler AI"

[feature_compiler_desc]
other = "Ubah NEIR menjadi set instruksi AI untuk 6 platform: GitHub Copilot, Claude Code, Cursor, Gemini CLI, Codex, dan OpenCode."

[feature_generator]
other = "Generator Kode"

[feature_generator_desc]
other = "Hasilkan kode siap-produksi dalam Go, TypeScript, Python, Java, dan Rust. Berbasis template dengan adapter per-bahasa."

[feature_neir]
other = "Model NEIR"

[feature_neir_desc]
other = "NAEOS Engineering Intermediate Representation — model kanonikal yang mendeskripsikan seluruh sistem: proyek, arsitektur, modul, layanan, API, infrastruktur, dan keamanan."

[feature_governance]
other = "Tata Kelola & Kebijakan"

[feature_governance_desc]
other = "Mesin kebijakan bawaan dengan 7 operator, RBAC, jejak audit, dan tinjauan artefak. Jaga tim Anda tetap selaras dengan aturan organisasi."

[feature_marketplace]
other = "Marketplace"

[feature_marketplace_desc]
other = "Publikasikan, temukan, dan pasang profil industri serta plugin. 5 profil bawaan: SaaS, AI Agent, FinTech, Healthcare, Government."

