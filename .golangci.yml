version: "2"
linters:
  enable:
    - bodyclose
    - errorlint
    - gosec
    - misspell
    - noctx
    - unconvert
    - unparam
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    gosec:
      excludes:
        - G104
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test\.go
      - linters:
          - errcheck
          - govet
          - ineffassign
          - staticcheck
          - unused
        path: zz_generated.*
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 10000
  max-same-issues: 10000
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/NAEOS-foundation/naeos
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
        - errcheck
        - staticcheck
        - unused
        - gosimple
        - ineffassign
        - typecheck
  max-issues-per-linter: 0
  max-same-issues: 0
