openapi: "3.0.3"

info:
  title: NAEOS API
  description: Neural Architecture Engine for Orchestration & Synthesis
  version: "0.8.0"
  contact:
    name: NAEOS Foundation
    url: https://github.com/NAEOS-foundation/naeos

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags: [System]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /specs:
    get:
      operationId: listSpecs
      summary: List all specifications
      tags: [Specifications]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of specs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecListResponse"
    post:
      operationId: createSpec
      summary: Create a new specification
      tags: [Specifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpecCreateRequest"
      responses:
        "201":
          description: Spec created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /specs/validate:
    post:
      operationId: validateSpec
      summary: Validate a specification
      tags: [Specifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpecValidateRequest"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecValidateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /specs/compile:
    post:
      operationId: compileSpec
      summary: Compile a specification
      tags: [Specifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpecCompileRequest"
      responses:
        "200":
          description: Compilation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecCompileResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /pipeline/run:
    post:
      operationId: runPipeline
      summary: Execute a pipeline
      tags: [Pipeline]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipelineRunRequest"
      responses:
        "202":
          description: Pipeline accepted and queued for execution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRunResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /pipeline/status:
    get:
      operationId: getPipelineStatus
      summary: Get pipeline execution status
      tags: [Pipeline]
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pipeline status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineStatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /artifacts:
    get:
      operationId: listArtifacts
      summary: List artifacts
      tags: [Artifacts]
      parameters:
        - name: spec_id
          in: query
          schema:
            type: string
        - name: kind
          in: query
          schema:
            type: string
            enum: [source, binary, manifest, log]
      responses:
        "200":
          description: List of artifacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactListResponse"
    post:
      operationId: uploadArtifact
      summary: Upload an artifact
      tags: [Artifacts]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, kind]
              properties:
                file:
                  type: string
                  format: binary
                kind:
                  type: string
                  enum: [source, binary, manifest, log]
                spec_id:
                  type: string
      responses:
        "201":
          description: Artifact uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /context/generate:
    post:
      operationId: generateContext
      summary: Generate context for a spec
      tags: [Context]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContextGenerateRequest"
      responses:
        "200":
          description: Generated context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextGenerateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /cloud/plan:
    post:
      operationId: cloudPlan
      summary: Generate a cloud deployment plan
      tags: [Cloud]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloudPlanRequest"
      responses:
        "200":
          description: Deployment plan generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudPlanResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /cloud/deploy:
    post:
      operationId: cloudDeploy
      summary: Deploy to cloud provider
      tags: [Cloud]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloudDeployRequest"
      responses:
        "202":
          description: Deployment accepted and in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudDeployResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /cloud/destroy:
    post:
      operationId: cloudDestroy
      summary: Destroy cloud resources
      tags: [Cloud]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloudDestroyRequest"
      responses:
        "202":
          description: Destruction accepted and in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudDestroyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /cloud/status:
    get:
      operationId: cloudStatus
      summary: Get cloud deployment status
      tags: [Cloud]
      parameters:
        - name: deployment_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cloud deployment status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudStatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /plugins:
    get:
      operationId: listPlugins
      summary: List installed plugins
      tags: [Plugins]
      responses:
        "200":
          description: List of plugins
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginListResponse"
    post:
      operationId: installPlugin
      summary: Install a plugin
      tags: [Plugins]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginInstallRequest"
      responses:
        "201":
          description: Plugin installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /plugins/execute:
    post:
      operationId: executePlugin
      summary: Execute a plugin command
      tags: [Plugins]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginExecuteRequest"
      responses:
        "200":
          description: Plugin execution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginExecuteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /plugins/{name}:
    get:
      operationId: getPlugin
      summary: Get plugin details
      tags: [Plugins]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Plugin details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: uninstallPlugin
      summary: Uninstall a plugin
      tags: [Plugins]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Plugin uninstalled
        "404":
          $ref: "#/components/responses/NotFound"

  /mcp/message:
    post:
      operationId: mcpMessage
      summary: Send an MCP message
      tags: [MCP]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MCPMessageRequest"
      responses:
        "200":
          description: MCP response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPMessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

components:
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            status:
              type: string
              example: ok
            version:
              type: string
              example: "0.8.0"
            uptime:
              type: string

    SpecCreateRequest:
      type: object
      required: [name, content]
      properties:
        name:
          type: string
        content:
          type: object
        version:
          type: string
          default: "1.0.0"
        description:
          type: string

    SpecResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        content:
          type: object
        created_at:
          type: string
          format: date-time

    SpecListResponse:
      type: object
      properties:
        specs:
          type: array
          items:
            $ref: "#/components/schemas/SpecResponse"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    SpecValidateRequest:
      type: object
      required: [spec_id]
      properties:
        spec_id:
          type: string

    SpecValidateResponse:
      type: object
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ValidationError"

    ValidationError:
      type: object
      properties:
        path:
          type: string
        message:
          type: string
        severity:
          type: string
          enum: [error, warning, info]

    SpecCompileRequest:
      type: object
      required: [spec_id]
      properties:
        spec_id:
          type: string
        target:
          type: string
          enum: [go, wasm, tflite]
          default: go

    SpecCompileResponse:
      type: object
      properties:
        artifact_id:
          type: string
        status:
          type: string
          example: compiled

    PipelineRunRequest:
      type: object
      required: [spec_id, pipeline]
      properties:
        spec_id:
          type: string
        pipeline:
          type: string
          enum: [build, deploy, test, full]
        params:
          type: object
          additionalProperties: true

    PipelineRunResponse:
      type: object
      properties:
        pipeline_id:
          type: string
        status:
          type: string
          example: queued

    PipelineStatusResponse:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [queued, running, succeeded, failed, cancelled]
        steps:
          type: array
          items:
            $ref: "#/components/schemas/PipelineStep"
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time

    PipelineStep:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [pending, running, succeeded, failed, skipped]
        message:
          type: string

    ArtifactResponse:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
        spec_id:
          type: string
        size:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time

    ArtifactListResponse:
      type: object
      properties:
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactResponse"
        total:
          type: integer

    ContextGenerateRequest:
      type: object
      required: [spec_id]
      properties:
        spec_id:
          type: string
        context_type:
          type: string
          enum: [full, summary, dependencies]
          default: full

    ContextGenerateResponse:
      type: object
      properties:
        context_id:
          type: string
        context:
          type: object
        generated_at:
          type: string
          format: date-time

    CloudPlanRequest:
      type: object
      required: [spec_id]
      properties:
        spec_id:
          type: string
        provider:
          type: string
          enum: [aws, gcp, azure, digitalocean]
        region:
          type: string
        resource_constraints:
          type: object
          properties:
            max_cpu:
              type: string
            max_memory:
              type: string
            max_storage:
              type: string

    CloudPlanResponse:
      type: object
      properties:
        plan_id:
          type: string
        resources:
          type: array
          items:
            $ref: "#/components/schemas/CloudResource"
        estimated_cost:
          type: object
          properties:
            monthly:
              type: number
              format: float
            currency:
              type: string
              example: USD

    CloudResource:
      type: object
      properties:
        type:
          type: string
          enum: [compute, storage, network, database, loadbalancer]
        name:
          type: string
        spec:
          type: object

    CloudDeployRequest:
      type: object
      required: [plan_id]
      properties:
        plan_id:
          type: string
        environment:
          type: string
          enum: [staging, production]
        dry_run:
          type: boolean
          default: false

    CloudDeployResponse:
      type: object
      properties:
        deployment_id:
          type: string
        status:
          type: string
          example: in_progress

    CloudDestroyRequest:
      type: object
      required: [deployment_id]
      properties:
        deployment_id:
          type: string
        force:
          type: boolean
          default: false

    CloudDestroyResponse:
      type: object
      properties:
        deployment_id:
          type: string
        status:
          type: string
          example: destroying

    CloudStatusResponse:
      type: object
      properties:
        deployment_id:
          type: string
        provider:
          type: string
        status:
          type: string
          enum: [planning, deploying, running, destroying, failed]
        resources:
          type: array
          items:
            $ref: "#/components/schemas/CloudResource"
        last_updated:
          type: string
          format: date-time

    PluginListResponse:
      type: object
      properties:
        plugins:
          type: array
          items:
            $ref: "#/components/schemas/PluginResponse"
        total:
          type: integer

    PluginResponse:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        description:
          type: string
        kind:
          type: string
          enum: [native, wasm]
        enabled:
          type: boolean
        installed_at:
          type: string
          format: date-time

    PluginInstallRequest:
      type: object
      required: [name, source]
      properties:
        name:
          type: string
        source:
          type: string
          description: Registry name or URL
        version:
          type: string

    PluginExecuteRequest:
      type: object
      required: [plugin, command]
      properties:
        plugin:
          type: string
        command:
          type: string
        args:
          type: object
          additionalProperties: true

    PluginExecuteResponse:
      type: object
      properties:
        plugin:
          type: string
        command:
          type: string
        result:
          type: object
        exit_code:
          type: integer

    MCPMessageRequest:
      type: object
      required: [method, params]
      properties:
        jsonrpc:
          type: string
          default: "2.0"
        method:
          type: string
        params:
          type: object
        id:
          oneOf:
            - type: string
            - type: integer

    MCPMessageResponse:
      type: object
      properties:
        jsonrpc:
          type: string
          example: "2.0"
        result:
          type: object
        error:
          type: object
          nullable: true
          properties:
            code:
              type: integer
            message:
              type: string
        id:
          oneOf:
            - type: string
            - type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
